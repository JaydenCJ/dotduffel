<svg xmlns="http://www.w3.org/2000/svg" width="720" height="436" viewBox="0 0 720 436" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="436" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">dotduffel — your dotfiles, any box, no trace</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> dotduffel ls</text>
  <text x="20" y="76" fill="#8b93a7">MODE  SIZE   DEST</text>
  <text x="20" y="94" fill="#c8ceda">644   325 B  .duffelrc</text>
  <text x="20" y="112" fill="#c8ceda">644   150 B  aliases.sh</text>
  <text x="20" y="130" fill="#c8ceda">644   283 B  duffelrc</text>
  <text x="20" y="148" fill="#8b93a7">3 files, 758 B raw -&gt; 541 B packed -&gt; 1.7 KiB bootstrap (<tspan fill="#98c379">2% of budget</tspan>)</text>

  <text x="20" y="176" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> dotduffel ssh devbox</text>
  <text x="20" y="196" fill="#c8ceda"><tspan fill="#61afef">(duffel)</tspan> you@devbox:~$ gs   <tspan fill="#5c6370"># your aliases, their box</tspan></text>
  <text x="20" y="214" fill="#c8ceda">On branch main — nothing to commit</text>
  <text x="20" y="232" fill="#c8ceda"><tspan fill="#61afef">(duffel)</tspan> you@devbox:~$ exit</text>
  <text x="20" y="250" fill="#8b93a7">tempdir removed — host left exactly as found</text>

  <text x="20" y="278" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> dotduffel docker mybox   <tspan fill="#5c6370"># same duffel, container shell</tspan></text>
  <text x="20" y="298" fill="#c8ceda"><tspan fill="#61afef">(duffel)</tspan> root@mybox:/# ll /etc/nginx</text>

  <text x="20" y="326" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> dotduffel emit   <tspan fill="#5c6370"># after id_rsa slipped into the manifest</tspan></text>
  <text x="20" y="346" fill="#e06c75">dotduffel: refusing to pack — 1 secret-guard finding:</text>
  <text x="20" y="364" fill="#c8ceda">  id_rsa: filename is an SSH private key by convention <tspan fill="#e06c75">(sensitive-name)</tspan></text>

  <text x="20" y="392" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> dotduffel pack -o duffel.tgz</text>
  <text x="20" y="412" fill="#c8ceda">packed 3 files -&gt; duffel.tgz (541 B, <tspan fill="#98c379">reproducible</tspan>)</text>
</svg>
